<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢文句形 フラッシュカード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
–ink: #1a0800;
–paper: #f7f0e0;
–paper2: #ede3c8;
–red: #b01218;
–red2: #e02828;
–gold: #c8922a;
–blue: #1a3a6a;
–shadow: rgba(26,8,0,0.22);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Serif JP’, serif;
background: var(–paper);
color: var(–ink);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(180,155,90,0.11) 32px);
overflow-x: hidden;
}

header {
width: 100%;
background: var(–red);
color: #fff;
text-align: center;
padding: 12px 12px 9px;
box-shadow: 0 3px 14px var(–shadow);
}
header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.3em; }
header p { font-size: 0.7rem; opacity: 0.82; margin-top: 2px; font-family: ‘Noto Sans JP’, sans-serif; letter-spacing: 0.12em; }

.filter-wrap {
width: 100%; max-width: 700px;
padding: 10px 12px 0;
display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
}
.fbtn {
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 0.72rem; padding: 4px 10px;
border: 1.5px solid var(–red); border-radius: 20px;
background: transparent; color: var(–red);
cursor: pointer; transition: all 0.16s; white-space: nowrap;
}
.fbtn.on, .fbtn:hover { background: var(–red); color: #fff; }

.stats {
width: 100%; max-width: 700px;
padding: 8px 14px 0;
display: flex; align-items: center; gap: 8px;
font-family: ‘Noto Sans JP’, sans-serif; font-size: 0.75rem; color: #7a5520;
}
.pbar { flex: 1; height: 4px; background: var(–paper2); border-radius: 3px; overflow: hidden; }
.pfill { height: 100%; background: var(–red); border-radius: 3px; transition: width 0.35s; }

/* ===== CARD ===== */
.scene {
width: calc(100% - 28px); max-width: 660px;
margin-top: 14px;
perspective: 1100px;
}
.card-wrap {
width: 100%; position: relative;
transform-style: preserve-3d;
transition: transform 0.5s cubic-bezier(.4,0,.2,1);
cursor: pointer;
min-height: 300px;
}
.card-wrap.flipped { transform: rotateY(180deg); }

.face {
width: 100%;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
border-radius: 8px;
box-shadow: 3px 3px 0 rgba(180,140,40,0.2), 0 10px 32px var(–shadow);
border: 2px solid var(–gold);
padding: 22px 20px 18px;
min-height: 300px;
display: flex; flex-direction: column;
}
.front {
background: #fff;
align-items: center; justify-content: center;
}
.back {
background: #fffbf2;
position: absolute; top: 0; left: 0;
transform: rotateY(180deg);
justify-content: flex-start;
}

/* FRONT */
.f-badge {
position: absolute; top: 10px; left: 13px;
font-size: 0.68rem; font-family: ‘Noto Sans JP’, sans-serif;
color: var(–red); font-weight: 700; letter-spacing: 0.1em;
background: #fff6ee; border: 1px solid var(–gold); border-radius: 3px; padding: 1px 7px;
}
.f-num {
position: absolute; top: 10px; right: 13px;
font-size: 0.68rem; font-family: ‘Noto Sans JP’, sans-serif; color: #9a7030;
}
.f-hakubun {
font-size: 2rem; font-weight: 700;
text-align: center; letter-spacing: 0.15em; line-height: 1.7;
color: var(–ink); margin-top: 10px;
}
.f-hint {
margin-top: 20px; font-size: 0.68rem; color: #a08040;
font-family: ‘Noto Sans JP’, sans-serif; letter-spacing: 0.08em;
}

/* BACK */
.b-cat {
font-size: 0.68rem; font-family: ‘Noto Sans JP’, sans-serif;
color: var(–blue); font-weight: 700; letter-spacing: 0.1em;
background: #eef3ff; border: 1px solid #88aadd; border-radius: 3px;
padding: 1px 7px; align-self: flex-start; margin-bottom: 10px;
}
.b-haku {
font-size: 1.35rem; font-weight: 700; color: var(–ink);
letter-spacing: 0.12em; margin-bottom: 6px; line-height: 1.65;
}
.b-kana {
font-size: 0.83rem; color: #5a4020; font-family: ‘Noto Sans JP’, sans-serif;
margin-bottom: 8px; line-height: 1.65; font-style: italic;
}
.divider {
width: 100%; height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
margin: 7px 0;
}
.b-imi {
font-size: 0.9rem; color: var(–blue); font-family: ‘Noto Sans JP’, sans-serif;
line-height: 1.7; font-weight: 500; margin-bottom: 8px;
}
.b-koho-label {
display: inline-block; background: var(–red); color: #fff;
font-family: ‘Noto Sans JP’, sans-serif; font-size: 0.7rem; font-weight: 700;
letter-spacing: 0.12em; padding: 2px 9px; border-radius: 3px; margin-bottom: 5px;
}
.b-pat {
font-size: 0.8rem; color: #5a3010; font-family: ‘Noto Sans JP’, sans-serif;
background: #fff8ee; border-left: 3px solid var(–gold);
padding: 5px 10px; border-radius: 0 3px 3px 0;
line-height: 1.65; margin-bottom: 6px;
}
.b-note {
font-size: 0.73rem; color: #7a6040; font-family: ‘Noto Sans JP’, sans-serif;
line-height: 1.6; font-style: italic;
}

/* ===== OVERLAY (○×) ===== */
.overlay {
position: fixed; inset: 0;
display: flex; align-items: center; justify-content: center;
pointer-events: none;
z-index: 100;
opacity: 0;
transition: opacity 0.25s ease;
}
.overlay.show { opacity: 1; }
.overlay-inner {
font-size: 9rem; line-height: 1;
text-shadow: 0 4px 24px rgba(0,0,0,0.3);
transform: scale(0.6);
transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .overlay-inner { transform: scale(1); }
.overlay.ok .overlay-inner { color: #2a8a3a; }
.overlay.ng .overlay-inner { color: #cc1a1a; }

/* ===== BUTTONS ===== */
.btn-row {
width: calc(100% - 28px); max-width: 660px;
display: flex; gap: 10px; margin-top: 12px;
}
.jbtn {
flex: 1; padding: 14px; border: none; border-radius: 6px;
font-family: ‘Noto Serif JP’, serif; font-size: 1.05rem; font-weight: 700;
cursor: pointer; letter-spacing: 0.15em; transition: all 0.14s;
opacity: 0; pointer-events: none; transform: translateY(6px);
transition: opacity 0.2s, transform 0.2s, background 0.1s, box-shadow 0.1s;
}
.jbtn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.jok { background: #1a6a2a; color: #fff; box-shadow: 0 3px 0 #0f4018; }
.jok:active { transform: translateY(3px); box-shadow: none; }
.jng { background: var(–red); color: #fff; box-shadow: 0 3px 0 #700a0a; }
.jng:active { transform: translateY(3px); box-shadow: none; }

.nav-row {
width: calc(100% - 28px); max-width: 660px;
display: flex; align-items: center; justify-content: space-between;
margin-top: 10px; gap: 10px;
}
.nbtn {
padding: 9px 18px; border: 1.5px solid var(–ink); background: transparent;
font-family: ‘Noto Sans JP’, sans-serif; font-size: 0.82rem;
cursor: pointer; border-radius: 5px; color: var(–ink); transition: all 0.14s;
}
.nbtn:hover { background: var(–ink); color: var(–paper); }
.nbtn:disabled { opacity: 0.28; cursor: default; background: transparent; color: var(–ink); }
.shbtn {
padding: 9px 13px; border: 1.5px solid var(–gold); background: transparent;
font-family: ‘Noto Sans JP’, sans-serif; font-size: 0.77rem;
cursor: pointer; border-radius: 5px; color: #7a5510; transition: all 0.14s;
}
.shbtn:hover { background: var(–gold); color: #fff; }

/* ===== RESULT ===== */
.result {
display: none;
width: calc(100% - 28px); max-width: 660px;
background: #fff; border: 2px solid var(–gold); border-radius: 8px;
box-shadow: 3px 3px 0 rgba(180,140,40,0.2), 0 10px 30px var(–shadow);
padding: 28px 20px; text-align: center; margin-top: 14px;
}
.result.show { display: block; }
.r-score { font-size: 3.2rem; font-weight: 900; color: var(–red); }
.r-msg { font-size: 0.95rem; color: #6a4420; font-family: ‘Noto Sans JP’, sans-serif; margin: 6px 0 20px; }
.rbtn {
padding: 12px 34px; background: var(–red); color: #fff; border: none;
border-radius: 5px; font-family: ‘Noto Serif JP’, serif; font-size: 1rem;
font-weight: 700; cursor: pointer; letter-spacing: 0.15em;
}
.wrong-hd {
font-size: 0.82rem; font-family: ‘Noto Sans JP’, sans-serif;
color: var(–red); font-weight: 700; border-bottom: 1px solid var(–gold);
padding-bottom: 4px; margin: 18px 0 8px; text-align: left;
}
.wrong-item {
font-size: 0.78rem; font-family: ‘Noto Sans JP’, sans-serif;
padding: 5px 0; border-bottom: 1px dotted #d0b060; color: var(–ink);
text-align: left; line-height: 1.6;
}
.wrong-item em { color: var(–red); font-style: normal; font-weight: 700; }

div[style*=“height:24px”] { height: 24px; }
</style>

</head>
<body>

<header>
  <h1>漢文句形 一問一答</h1>
  <p>表：白文　／　裏：読み・意味・句法</p>
</header>

<div class="filter-wrap" id="filterWrap"></div>

<div class="stats">
  <span id="sTxt">0 / 0</span>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <span id="okTxt">正解: 0</span>
</div>

<div class="scene" id="scene">
  <div class="card-wrap" id="cardWrap" onclick="flipCard()">
    <div class="face front">
      <div class="f-badge" id="fCat">—</div>
      <div class="f-num" id="fNum">1 / 1</div>
      <div class="f-hakubun" id="fHaku"></div>
      <div class="f-hint">タップして裏面を確認</div>
    </div>
    <div class="face back">
      <div class="b-cat" id="bCat">—</div>
      <div class="b-haku" id="bHaku"></div>
      <div class="b-kana" id="bKana"></div>
      <div class="divider"></div>
      <div class="b-imi" id="bImi"></div>
      <div class="b-koho-label" id="bKoho"></div>
      <div class="b-pat" id="bPat"></div>
      <div class="b-note" id="bNote"></div>
    </div>
  </div>
</div>

<!-- ○×オーバーレイ -->

<div class="overlay" id="overlay">
  <div class="overlay-inner" id="overlayChar"></div>
</div>

<div class="btn-row">
  <button class="jbtn jng" id="jng" onclick="judge(false)">✗ 不正解</button>
  <button class="jbtn jok" id="jok" onclick="judge(true)">○ 正解</button>
</div>

<div class="nav-row">
  <button class="nbtn" id="bPrev" onclick="move(-1)">◀ 前へ</button>
  <button class="shbtn" onclick="doShuffle()">シャッフル</button>
  <button class="nbtn" id="bNext" onclick="move(1)">次へ ▶</button>
</div>

<div class="result" id="result">
  <div class="r-score" id="rScore"></div>
  <div class="r-msg" id="rMsg"></div>
  <button class="rbtn" onclick="restart()">もう一度</button>
  <div id="wrongArea"></div>
</div>

<div style="height:28px"></div>

<script>
// ============================================================
//  全データ（画像4枚完全網羅）
//  haku=白文, kana=書き下し文, imi=現代語訳, koho=句法名, pat=句形パターン, note=補足
// ============================================================
const ALL = [

  /* ══════════ 再読文字 (p.20-21) ══════════ */
  { cat:"再読文字", haku:"未嘗聞。",
    kana:"いまだかつてきかず。",
    imi:"まだ一度も聞いたことがない。",
    koho:"再読文字「未」",
    pat:"未だ〜ず ＝ まだ〜していない",
    note:"「未」は副詞として「いまだ」と読み、否定の「ず」を伴う。" },

  { cat:"再読文字", haku:"将順且至楚下。",
    kana:"まさに楚の下に至らんとす。",
    imi:"今にも楚の下に至ろうとしている。",
    koho:"再読文字「将」",
    pat:"将に〜んとす ＝ 今にも〜しようとしている",
    note:"「将」は直近の未来を示す。" },

  { cat:"再読文字", haku:"高祖且勉学。",
    kana:"こうそかつまたまなびをつとめよ。",
    imi:"高祖よ、そのうえまた学問に励め。",
    koho:"再読文字「且」",
    pat:"且つ〜 ＝ そのうえ〜・また〜",
    note:"「且」は累加（さらに）の意を加える再読文字。" },

  { cat:"再読文字", haku:"宜従兄之言。",
    kana:"よろしくけいのげんにしたがうべし。",
    imi:"兄の言葉に従うのがよい。",
    koho:"再読文字「宜」",
    pat:"宜しく〜べし ＝ 〜するのがよい",
    note:"「宜」は適切な行為を勧める。" },

  { cat:"再読文字", haku:"行楽須及春。",
    kana:"こうらくはすべからくはるにおよぶべし。",
    imi:"行楽はぜひ春のうちにすべきである。",
    koho:"再読文字「須」",
    pat:"須く〜べし ＝ ぜひとも〜すべきだ",
    note:"「須」は義務・当然を強調する。" },

  { cat:"再読文字", haku:"過猶不及。",
    kana:"すぎたるはなおおよばざるがごとし。",
    imi:"やり過ぎは、なお及ばないのと同じことだ。",
    koho:"再読文字「猶」",
    pat:"猶ほ〜がごとし ＝ ちょうど〜のようだ",
    note:"「猶」は再読文字で比況（たとえ）を表す。論語より。" },

  { cat:"再読文字", haku:"応知此。",
    kana:"まさにこれをしるべし。",
    imi:"まさにこれを知るべきである。",
    koho:"再読文字「応」",
    pat:"応に〜べし ＝ 当然〜すべきだ",
    note:"「応」は当然・義務を表す再読文字。" },

  /* ══════════ 否定形 (p.32-41) ══════════ */
  { cat:"否定形", haku:"情人非木石。",
    kana:"じょうじんはぼくせきにあらず。",
    imi:"情のある人は木や石ではない。",
    koho:"否定形「非〜」",
    pat:"非〜（あらず） ＝ 〜ではない（名詞の否定）",
    note:"「非」は名詞・形容詞を否定する。動詞の否定には「不」を使う。" },

  { cat:"否定形", haku:"歳月不待人。",
    kana:"さいげつはひとをまたず。",
    imi:"歳月は人を待たない。",
    koho:"否定形「不〜」",
    pat:"不〜（〜ず） ＝ 〜しない（動詞・形容詞の否定）",
    note:"「不」は最も基本的な否定字。" },

  { cat:"否定形", haku:"己所不欲、勿施於人。",
    kana:"おのれのほっせざるところ、ひとにほどこすことなかれ。",
    imi:"自分が望まないことを、他人に施してはならない。",
    koho:"否定形「勿〜」（禁止）",
    pat:"勿〜（なかれ） ＝ 〜してはならない",
    note:"「勿・莫・毋・無」はすべて禁止を表す。論語の黄金律。" },

  { cat:"否定形", haku:"有備無患。",
    kana:"そなえあればうれいなし。",
    imi:"備えがあれば心配がない。",
    koho:"否定形「無〜」",
    pat:"無〜（なし） ＝ 〜がない",
    note:"「無」は存在否定と禁止の両義を持つ。" },

  { cat:"否定形", haku:"存亡不可知。",
    kana:"そんぼうしるべからず。",
    imi:"生死は知ることができない。",
    koho:"否定形「不可〜」",
    pat:"不可〜（〜すべからず） ＝ 〜できない／〜してはならない",
    note:"「不可」は不可能と禁止の両義がある。" },

  { cat:"否定形", haku:"盍各言爾志。",
    kana:"なんぞおのおのなんじのこころざしをいわざるか。",
    imi:"なぜそれぞれ自分の志を言わないのか。",
    koho:"否定形「盍〜」（反語的禁止）",
    pat:"盍ぞ〜ざるか ＝ なぜ〜しないのか（〜したらどうか）",
    note:"「盍」＝「何不」の合字。やんわりした勧め。" },

  /* ══════════ 疑問形 (p.44-51) ══════════ */
  { cat:"疑問形", haku:"此何人也。",
    kana:"これはいかなるひとか。",
    imi:"これはどういう人物なのか。",
    koho:"疑問形「何〜也」",
    pat:"何〜也（なに〜や） ＝ どのような〜か",
    note:"「也」で文末を結ぶ基本疑問形。" },

  { cat:"疑問形", haku:"相煎何太急。",
    kana:"あいせんすること、なんぞはなはだきゅうなる。",
    imi:"どうしてそんなに激しく煮立てるのか。",
    koho:"疑問形「何〜」",
    pat:"何ぞ〜（なんぞ〜） ＝ どうして〜なのか",
    note:"曹植「七歩の詩」。骨肉相食む悲劇を詠む。" },

  { cat:"疑問形", haku:"今蛇安在。",
    kana:"いまへびはいずくにかある。",
    imi:"今あの蛇はいったいどこにいるのか。",
    koho:"疑問形「安〜」",
    pat:"安んぞ〜（いずくんぞ〜） ＝ どこに・どうして〜か",
    note:"「安」は場所・理由を問う疑問副詞。" },

  { cat:"疑問形", haku:"創業守成孰難。",
    kana:"そうぎょうとしゅせいといずれかかたき。",
    imi:"創業と守成とどちらが難しいか。",
    koho:"疑問形「孰〜」",
    pat:"孰れか〜（いずれか〜） ＝ どちらが〜か",
    note:"「孰」は二者を比べる疑問詞。" },

  { cat:"疑問形", haku:"為之奈何。",
    kana:"これをいかんせん。",
    imi:"これをどうしたらよいか。",
    koho:"疑問形「奈何・如何・若何」",
    pat:"奈何（いかん） ＝ どうする・どうして",
    note:"「奈何・如何・若何」はいずれも「どうする」の疑問。" },

  { cat:"疑問形", haku:"子何為者也。",
    kana:"しはなんとするものか。",
    imi:"あなたは何をする人なのか。",
    koho:"疑問形「何為〜也」",
    pat:"何為〜（なんすれぞ〜） ＝ なぜ〜するのか",
    note:"「何為」は理由を問う。" },

  { cat:"疑問形", haku:"無夕不飲。",
    kana:"ゆうべとしてのまざるなし。",
    imi:"夕べとして飲まない夜はない。",
    koho:"疑問形（二重否定）「無〜不〜」",
    pat:"無〜不〜（〜として〜ざるなし） ＝ すべて〜する",
    note:"二重否定で全面的肯定を表す。" },

  { cat:"疑問形", haku:"吾矛之利、物無不陥也。",
    kana:"わがほこのとがりは、ものとしておとさざるなし。",
    imi:"私の矛の鋭さは、どんなものも突き通せないものはない。",
    koho:"疑問形「無不〜」",
    pat:"物無不〜（ものとして〜ざるなし） ＝ どんなものも〜する",
    note:"「矛盾」の故事より。" },

  { cat:"疑問形", haku:"勇者不必有仁。",
    kana:"ゆうしゃはかならずしもじんあらず。",
    imi:"勇者は必ずしも仁徳があるとは限らない。",
    koho:"疑問形「不必〜」（部分否定）",
    pat:"必ずしも〜ず ＝ 必ずしも〜とは限らない",
    note:"全否定「全く〜ず」との区別が重要。" },

  { cat:"疑問形", haku:"千里馬常有。",
    kana:"せんりのうまはつねにあり。",
    imi:"千里の馬は常にいる。",
    koho:"疑問形「常有」",
    pat:"常に有り ＝ 常にある（いる）",
    note:"韓愈「雑説」より。伯楽と千里の馬の有名な話。" },

  { cat:"疑問形", haku:"黄鶴一去不復返。",
    kana:"こうかくひとたびさりてまたかえらず。",
    imi:"黄鶴はひとたび去ってもう戻らない。",
    koho:"疑問形「不復〜」",
    pat:"不復〜（またず〜） ＝ 二度と〜しない",
    note:"崔顥「黄鶴楼」より。" },

  /* ══════════ 反語形 (p.52-57) ══════════ */
  { cat:"反語形", haku:"豈有此理乎。",
    kana:"あにこのことわりあらんや。",

  { cat:"故事句形", haku:"我安适归矣。",

    imi:"私はどこに帰ることができようか（帰る場所がない）。",
    koho:"反語形「安〜矣」",
    pat:"安んぞ〜んや ＝ どうして〜できようか",
    note:"「矣」は断定・詠嘆の終助詞。" },

  { cat:"故事句形", haku:"夫我志適王敵。",
    kana:"それわれはおうにてきすることをこころざす。",
    imi:"私は王に対抗することを志す。",
    koho:"疑問形「夫〜」",
    pat:"夫（それ）〜 ＝ 発語の助字（文頭に置いて文章を起こす）",
    note:"「夫」は発語・提示の助字。" },

  /* ══════════ 独特の句形 ══════════ */
  { cat:"特殊句形", haku:"何謂也。",
    kana:"なにをかいうや。",
    imi:"何を言っているのか。（どういう意味か。）",
    koho:"疑問形「何謂〜」",
    pat:"何を謂うや ＝ どういう意味か・何を言うのか",
    note:"「謂」は「言う・意味する」。" },

  { cat:"特殊句形", haku:"誰与王敵。",
    kana:"だれかおうとてきせん。",
    imi:"誰が王と対抗できようか（誰もできない）。",
    koho:"反語形「誰〜乎」",
    pat:"誰か〜（だれか〜） ＝ 誰が〜できようか（反語）",
    note:"「誰」を使った反語形。" },

  { cat:"特殊句形", haku:"此不過数里。",
    kana:"これはすうりにすぎず。",
    imi:"これは数里にすぎない。",
    koho:"限定形「不過〜」",
    pat:"不過〜（〜にすぎず） ＝ 〜にすぎない（限定）",
    note:"「不過」で最大限を限定する。" },

];

// ===== State =====
let cards = [...ALL];
let idx = 0;
let flipped = false;
let correct = 0;
let answered = 0;
let wrongs = [];

// ===== Filter =====
const cats = ["全て", ...new Set(ALL.map(c => c.cat))];
const fw = document.getElementById("filterWrap");
cats.forEach(cat => {
  const b = document.createElement("button");
  b.className = "fbtn" + (cat === "全て" ? " on" : "");
  b.textContent = cat;
  b.onclick = () => setFilter(cat, b);
  fw.appendChild(b);
});

function setFilter(cat, btn) {
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  cards = cat === "全て" ? [...ALL] : ALL.filter(c => c.cat === cat);
  restart();
}

// ===== Render =====
function render() {
  const c = cards[idx];
  flipped = false;
  document.getElementById("cardWrap").classList.remove("flipped");

  document.getElementById("fCat").textContent = c.cat;
  document.getElementById("fNum").textContent = (idx+1) + " / " + cards.length;
  document.getElementById("fHaku").textContent = c.haku;

  document.getElementById("bCat").textContent = c.cat;
  document.getElementById("bHaku").textContent = c.haku;
  document.getElementById("bKana").textContent = c.kana;
  document.getElementById("bImi").textContent = c.imi;
  document.getElementById("bKoho").textContent = c.koho;
  document.getElementById("bPat").textContent = c.pat;
  document.getElementById("bNote").textContent = c.note;

  document.getElementById("jok").classList.remove("show");
  document.getElementById("jng").classList.remove("show");
  document.getElementById("bPrev").disabled = idx === 0;
  document.getElementById("bNext").disabled = idx === cards.length - 1;
  document.getElementById("result").classList.remove("show");
  updateStats();
}

function updateStats() {
  const t = cards.length;
  const pct = t > 0 ? answered / t * 100 : 0;
  document.getElementById("sTxt").textContent = answered + " / " + t;
  document.getElementById("pfill").style.width = pct + "%";
  document.getElementById("okTxt").textContent = "正解: " + correct;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById("cardWrap").classList.toggle("flipped", flipped);
  if (flipped) {
    document.getElementById("jok").classList.add("show");
    document.getElementById("jng").classList.add("show");
  } else {
    document.getElementById("jok").classList.remove("show");
    document.getElementById("jng").classList.remove("show");
  }
}

// ===== ○×オーバーレイ（しっかり表示） =====
let overlayTimer = null;
function showOverlay(ok) {
  const el = document.getElementById("overlay");
  const ch = document.getElementById("overlayChar");
  // リセット
  el.classList.remove("show","ok","ng");
  ch.textContent = ok ? "○" : "✗";
  // 強制リフロー
  void el.offsetWidth;
  el.classList.add("show", ok ? "ok" : "ng");

  if (overlayTimer) clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => {
    el.classList.remove("show","ok","ng");
  }, 900);
}

function judge(ok) {
  if (!flipped) return;
  showOverlay(ok);
  if (ok) correct++;
  else wrongs.push(cards[idx]);
  answered++;
  updateStats();

  setTimeout(() => {
    if (answered >= cards.length) {
      showResult();
      return;
    }
    if (idx < cards.length - 1) { idx++; render(); }
  }, 500);
}

function move(d) {
  idx = Math.max(0, Math.min(cards.length - 1, idx + d));
  render();
}

function doShuffle() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  idx = 0; correct = 0; answered = 0; wrongs = [];
  render();
}

function showResult() {
  document.getElementById("result").classList.add("show");
  const pct = Math.round(correct / cards.length * 100);
  document.getElementById("rScore").textContent = correct + " / " + cards.length;
  document.getElementById("rMsg").textContent =
    pct >= 90 ? "完璧！句形完全マスター！" :
    pct >= 70 ? "よくできました！あと少し！" :
    pct >= 50 ? "半分以上！苦手句形を復習しよう" : "要復習。もう一度挑戦！";

  const wa = document.getElementById("wrongArea");
  if (wrongs.length > 0) {
    wa.innerHTML = '<div class="wrong-hd">間違えた問題（' + wrongs.length + '問）</div>' +
      wrongs.map(w =>
        `<div class="wrong-item"><em>【${w.cat}】</em> ${w.haku}<br>→ ${w.imi}</div>`
      ).join("");
  } else {
    wa.innerHTML = '<div class="wrong-hd" style="color:#1a6a2a">全問正解！完璧です！</div>';
  }
}

function restart() {
  idx = 0; correct = 0; answered = 0; wrongs = [];
  document.getElementById("result").classList.remove("show");
  render();
}

render();
</script>

</body>
</html>
