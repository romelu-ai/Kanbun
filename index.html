<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢文句形 フラッシュカード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif JP', serif;
  background: #f0ece4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

header {
  width: 100%;
  background: #c0201a;
  color: #fff;
  text-align: center;
  padding: 14px 16px 11px;
}
header h1 { font-size: 1.25rem; font-weight: 900; letter-spacing: 0.35em; }
header p { font-size: 0.72rem; opacity: 0.85; margin-top: 3px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.18em; }

.filter-wrap {
  width: 100%; max-width: 700px;
  padding: 12px 14px 4px;
  display: flex; flex-wrap: wrap; gap: 7px; justify-content: center;
}
.fbtn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.75rem; padding: 5px 13px;
  border: 1.5px solid #c0201a; border-radius: 20px;
  background: transparent; color: #c0201a;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.fbtn.on { background: #c0201a; color: #fff; }
.fbtn:hover:not(.on) { background: #fde8e8; }

.stats {
  width: 100%; max-width: 700px;
  padding: 8px 16px 4px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.74rem; color: #7a5520;
}
.pbar { flex: 1; height: 4px; background: #d8cdb0; border-radius: 3px; overflow: hidden; }
.pfill { height: 100%; background: #c0201a; border-radius: 3px; transition: width 0.35s; }

.scene {
  width: calc(100% - 28px); max-width: 660px;
  margin-top: 12px; perspective: 1100px;
}
.card-wrap {
  width: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  cursor: pointer; min-height: 310px;
}
.card-wrap.flipped { transform: rotateY(180deg); }

.face {
  width: 100%;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 10px;
  box-shadow: 2px 4px 16px rgba(0,0,0,0.13);
  border: 2px solid #c8922a;
  padding: 18px 18px;
  min-height: 310px; display: flex; flex-direction: column;
}
.front { background: #fff; align-items: center; justify-content: center; position: relative; }
.back { background: #fffbf3; position: absolute; top: 0; left: 0; transform: rotateY(180deg); justify-content: flex-start; }

.f-badge {
  position: absolute; top: 12px; left: 14px;
  font-size: 0.7rem; font-family: 'Noto Sans JP', sans-serif;
  color: #c0201a; font-weight: 700; letter-spacing: 0.08em;
  background: #fff; border: 1.5px solid #c0201a; border-radius: 5px; padding: 2px 8px;
}
.f-num {
  position: absolute; top: 12px; right: 14px;
  font-size: 0.7rem; font-family: 'Noto Sans JP', sans-serif; color: #9a7030;
}
.f-hakubun {
  font-size: 2.1rem; font-weight: 700; text-align: center;
  letter-spacing: 0.2em; line-height: 1.7; color: #1a0800;
}
.f-hint { margin-top: 22px; font-size: 0.7rem; color: #a08040; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.06em; }

.b-cat {
  font-size: 0.7rem; font-family: 'Noto Sans JP', sans-serif;
  color: #1a3a6a; font-weight: 700; letter-spacing: 0.1em;
  background: #eef3ff; border: 1px solid #88aadd; border-radius: 3px;
  padding: 2px 8px; align-self: flex-start; margin-bottom: 10px;
}
.b-haku { font-size: 1.3rem; font-weight: 700; color: #1a0800; letter-spacing: 0.12em; margin-bottom: 5px; line-height: 1.65; }
.b-kana { font-size: 0.82rem; color: #5a4020; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 7px; line-height: 1.65; font-style: italic; }
.divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #c8922a, transparent); margin: 6px 0; }
.b-imi { font-size: 0.88rem; color: #1a3a6a; font-family: 'Noto Sans JP', sans-serif; line-height: 1.7; font-weight: 500; margin-bottom: 7px; }
.b-koho-label {
  display: inline-block; background: #c0201a; color: #fff;
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; padding: 2px 9px; border-radius: 3px; margin-bottom: 5px;
}
.b-pat {
  font-size: 0.78rem; color: #5a3010; font-family: 'Noto Sans JP', sans-serif;
  background: #fff8ee; border-left: 3px solid #c8922a;
  padding: 5px 10px; border-radius: 0 3px 3px 0; line-height: 1.65; margin-bottom: 6px;
}
.b-note { font-size: 0.7rem; color: #7a6040; font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; font-style: italic; }

.overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.2s ease;
}
.overlay.show { opacity: 1; }
.overlay-inner {
  font-size: 10rem; line-height: 1; text-shadow: 0 4px 24px rgba(0,0,0,0.25);
  transform: scale(0.6); transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .overlay-inner { transform: scale(1); }
.overlay.ok .overlay-inner { color: #2a8a3a; }
.overlay.ng .overlay-inner { color: #cc1a1a; }

.btn-row {
  width: calc(100% - 28px); max-width: 660px;
  display: flex; gap: 10px; margin-top: 12px;
}
.jbtn {
  flex: 1; padding: 14px; border: none; border-radius: 7px;
  font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.15em;
  opacity: 0; pointer-events: none; transform: translateY(5px);
  transition: opacity 0.2s, transform 0.2s;
}
.jbtn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.jok { background: #1a6a2a; color: #fff; box-shadow: 0 3px 0 #0f4018; }
.jok:active { transform: translateY(3px); box-shadow: none; }
.jng { background: #c0201a; color: #fff; box-shadow: 0 3px 0 #700a0a; }
.jng:active { transform: translateY(3px); box-shadow: none; }

.nav-row {
  width: calc(100% - 28px); max-width: 660px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px; gap: 10px; padding-bottom: 24px;
}
.nbtn {
  padding: 11px 22px; border: 1.5px solid #1a0800; background: #fff;
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.84rem;
  cursor: pointer; border-radius: 7px; color: #1a0800; transition: all 0.14s; font-weight: 500;
}
.nbtn:hover { background: #1a0800; color: #fff; }
.nbtn:disabled { opacity: 0.3; cursor: default; background: #fff; color: #1a0800; }
.shbtn {
  padding: 11px 20px; border: 1.5px solid #c8922a; background: #fff;
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem;
  cursor: pointer; border-radius: 7px; color: #7a5510; transition: all 0.14s;
}
.shbtn:hover { background: #c8922a; color: #fff; }

.result {
  display: none; width: calc(100% - 28px); max-width: 660px;
  background: #fff; border: 2px solid #c8922a; border-radius: 10px;
  box-shadow: 2px 4px 16px rgba(0,0,0,0.12);
  padding: 28px 20px; text-align: center; margin-top: 14px;
}
.result.show { display: block; }
.r-score { font-size: 3.2rem; font-weight: 900; color: #c0201a; }
.r-msg { font-size: 0.95rem; color: #6a4420; font-family: 'Noto Sans JP', sans-serif; margin: 6px 0 20px; }
.rbtn { padding: 12px 34px; background: #c0201a; color: #fff; border: none; border-radius: 6px; font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.15em; }
.wrong-hd { font-size: 0.82rem; font-family: 'Noto Sans JP', sans-serif; color: #c0201a; font-weight: 700; border-bottom: 1px solid #c8922a; padding-bottom: 4px; margin: 18px 0 8px; text-align: left; }
.wrong-item { font-size: 0.78rem; font-family: 'Noto Sans JP', sans-serif; padding: 5px 0; border-bottom: 1px dotted #d0b060; color: #1a0800; text-align: left; line-height: 1.6; }
.wrong-item em { color: #c0201a; font-style: normal; font-weight: 700; }

.mode-wrap {
  width: 100%; max-width: 700px;
  padding: 8px 14px 4px;
}
.mode-label {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.68rem; color: #9a7030; font-weight: 700;
  letter-spacing: 0.12em; margin-bottom: 5px;
}
.mode-btns {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.mbtn {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.72rem; padding: 5px 12px;
  border: 1.5px solid #1a3a6a; border-radius: 5px;
  background: transparent; color: #1a3a6a;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.mbtn.on { background: #1a3a6a; color: #fff; }
.mbtn:hover:not(.on) { background: #eef3ff; }
.mbtn-weak { border-color: #c8922a; color: #7a5510; }
.mbtn-weak.on { background: #c8922a; color: #fff; border-color: #c8922a; }
.mbtn-weak:hover:not(.on) { background: #fff8ee; }


.f-weak-badge {
  position: absolute; bottom: 12px; right: 14px;
  font-size: 0.65rem; font-family: 'Noto Sans JP', sans-serif;
  color: #7a5510; font-weight: 700;
  background: #fff8ee; border: 1.5px solid #c8922a; border-radius: 4px;
  padding: 2px 7px;
}

</style>
</head>
<body>

<header>
  <h1>漢文句形　一問一答</h1>
  <p>表：白文　／　裏：読み・意味・句法</p>
</header>

<div class="filter-wrap" id="filterWrap"></div>

<!-- モード選択 -->
<div class="mode-wrap">
  <div class="mode-label">出題モード</div>
  <div class="mode-btns">
    <button class="mbtn on" id="mAll" onclick="setMode('all',this)">全問</button>
    <button class="mbtn" id="m10"  onclick="setMode(10,this)">ランダム10問</button>
    <button class="mbtn" id="m20"  onclick="setMode(20,this)">ランダム20問</button>
    <button class="mbtn" id="m30"  onclick="setMode(30,this)">ランダム30問</button>
    <button class="mbtn mbtn-weak" id="mWeak" onclick="setMode('weak',this)">苦手のみ <span id="weakCount"></span></button>
  </div>
</div>

<div class="stats">
  <span id="sTxt">0 / 0</span>
  <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  <span id="okTxt">正解: 0</span>
</div>

<div class="scene">
  <div class="card-wrap" id="cardWrap" onclick="flipCard()">
    <div class="face front">
      <div class="f-badge" id="fCat">—</div>
      <div class="f-num" id="fNum">1 / 1</div>
      <div class="f-weak-badge" id="fWeakBadge" style="display:none">⚠ 苦手</div>
      <div class="f-hakubun" id="fHaku"></div>
      <div class="f-hint">タップして裏面を確認</div>
    </div>
    <div class="face back">
      <div class="b-cat" id="bCat">—</div>
      <div class="b-haku" id="bHaku"></div>
      <div class="b-kana" id="bKana"></div>
      <div class="divider"></div>
      <div class="b-imi" id="bImi"></div>
      <div class="b-koho-label" id="bKoho"></div>
      <div class="b-pat" id="bPat"></div>
      <div class="b-note" id="bNote"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-inner" id="overlayChar"></div>
</div>

<div class="btn-row">
  <button class="jbtn jng" id="jng" onclick="judge(false)">✗　不正解</button>
  <button class="jbtn jok" id="jok" onclick="judge(true)">○　正解</button>
</div>

<div class="nav-row">
  <button class="nbtn" id="bPrev" onclick="move(-1)">◀ 前へ</button>
  <button class="shbtn" onclick="doShuffle()">シャッフル</button>
  <button class="nbtn" id="bNext" onclick="move(1)">次へ ▶</button>
</div>

<div class="result" id="result">
  <div class="r-score" id="rScore"></div>
  <div class="r-msg" id="rMsg"></div>
  <button class="rbtn" onclick="restart()">もう一度</button>
  <div id="wrongArea"></div>
</div>

<script>
// ============================================================
//  全データ（句形マスターシート 4枚完全網羅）
// ============================================================
const ALL = [

  /* ══════════ 再読文字（p.20-21）══════════ */
  {
    cat:"再読文字",
    haku:"未嘗聞好学者也。",
    kana:"いまだかつて学を好む者を聞かず。",
    imi:"まだ一度も学問を好む者を聞いたことがない。",
    koho:"再読文字「未」",
    pat:"未だ〜ず ＝ まだ〜していない",
    note:"「未」はまず「いまだ」と読み、文末で「ず」と再び読む。"
  },
  {
    cat:"再読文字",
    haku:"将順且至楚下。",
    kana:"まさに楚の下に至らんとす。",
    imi:"今にも楚の下に至ろうとしている。",
    koho:"再読文字「将」",
    pat:"将に〜んとす ＝ 今にも〜しようとしている",
    note:"「将」はまず「まさに」と読み、文末で「〜んとす」と再び読む。"
  },
  {
    cat:"再読文字",
    haku:"高祖順江東下。",
    kana:"こうそ、まさに江東に順ひて下るべし。",
    imi:"高祖よ、今にも江東に沿って下るべきだ。",
    koho:"再読文字「将／応」",
    pat:"将に／応に〜べし ＝ 今にも〜すべきだ",
    note:"「将」「応」はともに近い未来や当然を示す再読文字。"
  },
  {
    cat:"再読文字",
    haku:"及時当勉励。",
    kana:"時に及んで、まさに勉励すべし。",
    imi:"時機を逃さず、まさに励むべきだ。",
    koho:"再読文字「当」",
    pat:"当に〜べし ＝ まさに〜すべきだ",
    note:"「当」はまず「まさに」と読み、文末で「べし」と再び読む。"
  },
  {
    cat:"再読文字",
    haku:"宜従兄之言。",
    kana:"よろしく兄の言に従うべし。",
    imi:"兄の言葉に従うのがよい。",
    koho:"再読文字「宜」",
    pat:"宜しく〜べし ＝ 〜するのがよい",
    note:"「宜」はまず「よろしく」と読み、文末で「べし」と再び読む。"
  },
  {
    cat:"再読文字",
    haku:"行楽須及春。",
    kana:"行楽は、須らく春に及ぶべし。",
    imi:"行楽はぜひ春のうちにすべきである。",
    koho:"再読文字「須」",
    pat:"須らく〜べし ＝ ぜひとも〜すべきだ",
    note:"「須」はまず「すべからく」と読み、文末で「べし」と再び読む。"
  },
  {
    cat:"再読文字",
    haku:"過猶不及。",
    kana:"過ぎたるは、猶ほ及ばざるがごとし。",
    imi:"やり過ぎは、なお及ばないのと同じことだ。",
    koho:"再読文字「猶」",
    pat:"猶ほ〜がごとし ＝ ちょうど〜のようだ",
    note:"「猶」は再読文字として「なほ」と読み、比況「〜のごとし」と呼応する。論語より。"
  },
  {
    cat:"再読文字",
    haku:"盍各言爾志。",
    kana:"盍ぞ各おのおのの爾の志を言わざる。",
    imi:"なぜそれぞれ自分の志を言わないのか。",
    koho:"再読文字「盍」",
    pat:"盍ぞ〜ざる ＝ なぜ〜しないのか（勧誘）",
    note:"「盍」＝「何不」の合字。まず「なんぞ」と読み、文末で「〜ざる」と再び読む。"
  },

  /* ══════════ 否定形 ══════════ */
  {
    cat:"否定形",
    haku:"歳月不待人。",
    kana:"歳月は人を待たず。",
    imi:"歳月は人を待たない。",
    koho:"否定形「不〜」",
    pat:"不〜（〜ず） ＝ 〜しない",
    note:"「不」は動詞・形容詞の前に置く最も基本的な否定字。"
  },
  {
    cat:"否定形",
    haku:"情人非木石。",
    kana:"情人は木石にあらず。",
    imi:"情のある人は木や石ではない。",
    koho:"否定形「非〜」",
    pat:"非〜（あらず） ＝ 〜ではない（名詞の否定）",
    note:"「非」は名詞・形容詞を否定する。動詞の否定には「不」を使う。"
  },
  {
    cat:"否定形",
    haku:"有備無患。",
    kana:"備えあれば患い無し。",
    imi:"備えがあれば心配がない。",
    koho:"否定形「無〜」",
    pat:"無〜（なし） ＝ 〜がない",
    note:"「無」は存在否定。禁止の「無（なかれ）」とは区別する。"
  },
  {
    cat:"否定形",
    haku:"己所不欲、勿施於人。",
    kana:"己の欲せざる所、人に施すこと勿かれ。",
    imi:"自分が望まないことを、他人に施してはならない。",
    koho:"否定形「勿〜」（禁止）",
    pat:"勿〜（なかれ） ＝ 〜してはならない",
    note:"「勿・莫・毋・無」はすべて禁止を表す助字。論語の黄金律。"
  },
  {
    cat:"否定形",
    haku:"存亡不可知。",
    kana:"存亡は知るべからず。",
    imi:"生死は知ることができない。",
    koho:"否定形「不可〜」",
    pat:"不可〜（〜すべからず） ＝ 〜できない／〜してはならない",
    note:"「不可」は不可能と禁止の両義がある。"
  },
  {
    cat:"否定形",
    haku:"情人有備非木石皆有情。",
    kana:"情人は木石にあらず、皆情有り。",
    imi:"情のある人は木石ではなく、みな情がある。",
    koho:"否定形「非〜」の応用",
    pat:"非〜（あらず）＝〜ではない　＋　皆〜（みな〜）",
    note:"歳月不待人・有備無患と並ぶ否定形の代表例。"
  },

  /* ══════════ 疑問形 ══════════ */
  {
    cat:"疑問形",
    haku:"莫不料死、不能料生、不能料。",
    kana:"死を料ること能わず、生を料ること能わず。",
    imi:"死を計ることができず、生を計ることもできない。",
    koho:"疑問形「不能〜」",
    pat:"能（よ）く〜ず ＝ 〜することができない",
    note:"「不能・不可・未能」はいずれも不可能を表す。"
  },
  {
    cat:"疑問形",
    haku:"此何人也。",
    kana:"これは何人ぞや。",
    imi:"これはどういう人物なのか。",
    koho:"疑問形「何〜也」",
    pat:"何〜也（なに〜や） ＝ どのような〜か",
    note:"「也」で文末を結ぶ基本疑問形。"
  },
  {
    cat:"疑問形",
    haku:"今蛇安在。",
    kana:"今、蛇は安くにかある。",
    imi:"今あの蛇はいったいどこにいるのか。",
    koho:"疑問形「安〜」",
    pat:"安んぞ〜（いずくんぞ〜） ＝ どこに・どうして〜か",
    note:"「安」は場所・理由を問う疑問副詞。"
  },
  {
    cat:"疑問形",
    haku:"相煎何太急。",
    kana:"相煎ること、何ぞはなはだ急なる。",
    imi:"どうしてそんなに激しく煮立てるのか。",
    koho:"疑問形「何〜」",
    pat:"何ぞ〜（なんぞ〜） ＝ どうして〜なのか",
    note:"曹植「七歩の詩」より。骨肉相食む悲劇を詠む。"
  },
  {
    cat:"疑問形",
    haku:"創業守成孰難。",
    kana:"創業と守成といずれか難き。",
    imi:"創業と守成とどちらが難しいか。",
    koho:"疑問形「孰〜」",
    pat:"孰れか〜（いずれか〜） ＝ どちらが〜か",
    note:"「孰」は二者を比べる疑問詞。"
  },
  {
    cat:"疑問形",
    haku:"為之奈何。",
    kana:"これを奈何せん。",

// ============================================================
// アプリロジック
// ============================================================
let cards = [...ALL];
let idx = 0, flipped = false, correct = 0, answered = 0, wrongs = [];
let currentFilter = "全て";  // 現在選択中のカテゴリ
let currentMode = "all";     // 出題モード: 'all' | 10 | 20 | 30 | 'weak'
let weakSet = new Set();     // 苦手問題（haku をキーに保存）

// LocalStorage から苦手セット読み込み
try {
  const saved = localStorage.getItem("kanbun_weak");
  if (saved) weakSet = new Set(JSON.parse(saved));
} catch(e) { /* ignore */ }

function saveWeak() {
  try { localStorage.setItem("kanbun_weak", JSON.stringify([...weakSet])); } catch(e) { /* ignore */ }
}

// フィルターボタン生成
const cats = ["全て", ...new Set(ALL.map(c => c.cat))];
const fw = document.getElementById("filterWrap");
cats.forEach(cat => {
  const b = document.createElement("button");
  b.className = "fbtn" + (cat === "全て" ? " on" : "");
  b.textContent = cat;
  b.onclick = () => setFilter(cat, b);
  fw.appendChild(b);
});

function setFilter(cat, btn) {
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  currentFilter = cat;
  applyModeAndFilter();
}

function setMode(mode, btn) {
  document.querySelectorAll(".mbtn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  currentMode = mode;
  applyModeAndFilter();
}

// カテゴリフィルタ後、モードを適用してデッキを作る
function applyModeAndFilter() {
  // 1. カテゴリフィルタ
  let pool = currentFilter === "全て" ? [...ALL] : ALL.filter(c => c.cat === currentFilter);

  // 2. 苦手モードなら苦手のみ
  if (currentMode === "weak") {
    pool = pool.filter(c => weakSet.has(c.haku));
    if (pool.length === 0) {
      alert("苦手問題がまだありません。\n✗ 不正解を押すと苦手に登録されます。");
      // モードを「全問」に戻す
      document.querySelectorAll(".mbtn").forEach(b => b.classList.remove("on"));
      document.getElementById("mAll").classList.add("on");
      currentMode = "all";
      pool = currentFilter === "全て" ? [...ALL] : ALL.filter(c => c.cat === currentFilter);
    }
  }

  // 3. ランダムN問
  if (typeof currentMode === "number") {
    const n = Math.min(currentMode, pool.length);
    pool = shuffle([...pool]).slice(0, n);
  } else {
    pool = shuffle([...pool]);
  }

  cards = pool;
  idx = 0; correct = 0; answered = 0; wrongs = [];
  document.getElementById("result").classList.remove("show");
  updateWeakCount();
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateWeakCount() {
  const n = weakSet.size;
  document.getElementById("weakCount").textContent = n > 0 ? "(" + n + ")" : "";
}

function render() {
  if (!cards.length) return;
  const c = cards[idx];
  flipped = false;
  document.getElementById("cardWrap").classList.remove("flipped");
  document.getElementById("fCat").textContent = c.cat;
  document.getElementById("fNum").textContent = (idx+1) + " / " + cards.length;
  document.getElementById("fHaku").textContent = c.haku;
  document.getElementById("bCat").textContent = c.cat;
  document.getElementById("bHaku").textContent = c.haku;
  document.getElementById("bKana").textContent = c.kana;
  document.getElementById("bImi").textContent = c.imi;
  document.getElementById("bKoho").textContent = c.koho;
  document.getElementById("bPat").textContent = c.pat;
  document.getElementById("bNote").textContent = c.note;

  // 苦手バッジ表示
  const badge = document.getElementById("fWeakBadge");
  if (badge) badge.style.display = weakSet.has(c.haku) ? "block" : "none";

  document.getElementById("jok").classList.remove("show");
  document.getElementById("jng").classList.remove("show");
  document.getElementById("bPrev").disabled = idx === 0;
  document.getElementById("bNext").disabled = idx === cards.length - 1;
  document.getElementById("result").classList.remove("show");
  updateStats();
}

function updateStats() {
  const t = cards.length;
  document.getElementById("sTxt").textContent = answered + " / " + t;
  document.getElementById("pfill").style.width = (t > 0 ? answered / t * 100 : 0) + "%";
  document.getElementById("okTxt").textContent = "正解: " + correct;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById("cardWrap").classList.toggle("flipped", flipped);
  document.getElementById("jok").classList.toggle("show", flipped);
  document.getElementById("jng").classList.toggle("show", flipped);
}

let overlayTimer = null;
function showOverlay(ok) {
  const el = document.getElementById("overlay");
  const ch = document.getElementById("overlayChar");
  el.classList.remove("show","ok","ng");
  ch.textContent = ok ? "○" : "✗";
  void el.offsetWidth;
  el.classList.add("show", ok ? "ok" : "ng");
  if (overlayTimer) clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => el.classList.remove("show","ok","ng"), 900);
}

function judge(ok) {
  if (!flipped) return;
  showOverlay(ok);
  if (ok) {
    correct++;
    // 正解したら苦手から外す
    weakSet.delete(cards[idx].haku);
    saveWeak();
  } else {
    wrongs.push(cards[idx]);
    // 不正解なら苦手に追加
    weakSet.add(cards[idx].haku);
    saveWeak();
  }
  updateWeakCount();
  answered++;
  updateStats();
  setTimeout(() => {
    if (answered >= cards.length) { showResult(); return; }
    if (idx < cards.length - 1) { idx++; render(); }
  }, 500);
}

function move(d) {
  idx = Math.max(0, Math.min(cards.length - 1, idx + d));
  render();
}

function doShuffle() {
  cards = shuffle([...cards]);
  idx = 0; correct = 0; answered = 0; wrongs = [];
  render();
}

function showResult() {
  document.getElementById("result").classList.add("show");
  const pct = Math.round(correct / cards.length * 100);
  document.getElementById("rScore").textContent = correct + " / " + cards.length;
  document.getElementById("rMsg").textContent =
    pct >= 90 ? "完璧！句形完全マスター！" :
    pct >= 70 ? "よくできました！あと少し！" :
    pct >= 50 ? "半分以上！苦手句形を復習しよう" : "要復習。もう一度挑戦！";
  const wa = document.getElementById("wrongArea");
  if (wrongs.length > 0) {
    var html = '<div class="wrong-hd">間違えた問題（' + wrongs.length + '問）</div>';
    wrongs.forEach(function(w) {
      html += '<div class="wrong-item"><em>【' + w.cat + '】</em> ' + w.haku + '<br>→ ' + w.imi + '</div>';
    });
    html += '<button class="rbtn rbtn-sub" style="margin-top:8px;background:#c8922a;" onclick="playWrongsOnly()">苦手のみ再挑戦</button>';
    wa.innerHTML = html;
  } else {
    wa.innerHTML = '<div class="wrong-hd" style="color:#1a6a2a">全問正解！完璧です！</div>';
  }
}

function playWrongsOnly() {
  // 今セッションの間違えた問題だけでもう一度
  cards = shuffle([...wrongs]);
  idx = 0; correct = 0; answered = 0; wrongs = [];
  document.getElementById("result").classList.remove("show");
  render();
}

function restart() {
  applyModeAndFilter();
}

// 初期化
updateWeakCount();
applyModeAndFilter();
</script>
